name: Recovery Builder

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Coosn Manifest Branch (e.g. twrp-7.1)'
        required: true
        default: 'twrp-7.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH (e.g. device/samsung/a700yd)'
        required: true
        default: 'device/samsung/a700yd'
      DEVICE_NAME:
        description: 'DEVICE_NAME (e.g. a700yd)'
        required: true
        default: 'a700yd'
      DEVICE_MAKEFILE:
        description: 'DEVICE_MAKEFILE (e.g. omni_a700yd)'
        required: true
        default: 'omni_a700yd'
      BUILD_TARGET:
        description: 'BUILD_TARGET (e.g. recovery)'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Cleanup Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc bison build-essential ccache curl flex g++ gcc git gnupg gperf liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxslt1-dev lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Install Repo tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync TWRP Source
      run: |
        mkdir ~/twrp
        cd ~/twrp
        git config --global user.name "davura259-debug"
        git config --global user.email "davura259-debug@github.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b ${{ github.event.inputs.MANIFEST_BRANCH }}
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd ~/twrp
        git clone https://github.com/davura259-debug/twrp_device_samsung_a700yd.git -b main ${{ github.event.inputs.DEVICE_PATH }}

    - name: Building Recovery
      run: |
        cd ~/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch ${{ github.event.inputs.DEVICE_MAKEFILE }}-eng
        make clean
        make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Upload Finished Recovery
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Result
        path: ~/twrp/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery.img
